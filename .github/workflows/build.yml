name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # necesario para publicar el release sin tocar ajustes del repo

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --icon=icon.ico --add-data "icon.ico;." --add-data "icon.png;." --name Prodify_Dual Prodify_Dual.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prodify_Dual
          path: dist/Prodify_Dual.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Prodify_Dual.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
